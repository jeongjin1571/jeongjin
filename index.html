<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f2a3f">
<title>성분별 급여 주사제</title>
<style>
  :root{
    --ink:#122430; --ink2:#4a5b66; --line:#e2e6e4; --bg:#f4f5f2;
    --card:#ffffff; --accent:#127a6b; --accent-d:#0c5a4f; --price:#0f4c3a;
    --chip:#eef2f0; --shadow:0 1px 2px rgba(18,36,48,.06),0 2px 8px rgba(18,36,48,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  /* ---- Header ---- */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,#0f2a3f 0%,#123b47 100%);
    color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
    box-shadow:0 2px 10px rgba(15,42,63,.22);
  }
  .brand{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
  .brand-title{min-width:0}
  .brand h1{font-size:17px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.25}
  .brand-info{margin-top:4px;font-size:11.5px;color:#c8d8d6;font-weight:600;line-height:1.35;letter-spacing:-.02em}
  .brand .sub{flex:0 0 auto;font-size:11px;color:#9fc7c0;font-weight:600;letter-spacing:.04em;margin-top:3px}
  .search{position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:12px;width:18px;height:18px;fill:#8aa3ab}
  #q{
    width:100%; border:0; border-radius:12px; padding:12px 40px 12px 38px;
    font-size:16px; background:#ffffff; color:#122430; outline:none;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
  }
  #q::placeholder{color:#9aa9ad}
  .clear{
    position:absolute;right:8px;width:26px;height:26px;border:0;border-radius:50%;
    background:#e6ebe9;color:#5a6b70;font-size:15px;display:none;align-items:center;
    justify-content:center;cursor:pointer
  }
  .clear.show{display:flex}
  .stat{display:flex;gap:14px;margin-top:10px;font-size:11px;color:#a9cbc5;font-weight:600}
  .stat b{color:#fff;font-weight:800}
  /* ---- Category filter row ---- */
  .catbar{
    display:flex;gap:7px;overflow-x:auto;padding:10px 12px;background:var(--bg);
    position:sticky;top:0;z-index:10;-webkit-overflow-scrolling:touch;
    border-bottom:1px solid var(--line); scrollbar-width:none;
  }
  .catbar::-webkit-scrollbar{display:none}
  .catchip{
    flex:0 0 auto;padding:7px 13px;border-radius:20px;background:var(--chip);
    color:var(--ink2);font-size:12.5px;font-weight:700;border:1px solid transparent;
    cursor:pointer;white-space:nowrap
  }
  .catchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* ---- List ---- */
  main{padding:10px 12px calc(env(safe-area-inset-bottom) + 40px)}
  .grp-cat{
    font-size:12px;font-weight:800;color:var(--accent-d);letter-spacing:.02em;
    margin:16px 4px 8px;text-transform:none;display:flex;align-items:center;gap:8px
  }
  .grp-cat::after{content:"";flex:1;height:1px;background:var(--line)}
  .ing{
    background:var(--card);border-radius:14px;margin-bottom:9px;overflow:hidden;
    box-shadow:var(--shadow);border:1px solid #edf0ee
  }
  .ing-head{
    display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;
    user-select:none
  }
  .ing-head:active{background:#f7f9f8}
  .ing-main{flex:1;min-width:0}
  .ing-name{
    font-size:15.5px;font-weight:800;letter-spacing:-.01em;color:var(--ink);
    word-break:break-word;line-height:1.3
  }
  .ing-meta{font-size:11.5px;color:var(--ink2);margin-top:2px;font-weight:600}
  .ing-count{
    flex:0 0 auto;background:var(--chip);color:var(--accent-d);font-size:11px;
    font-weight:800;padding:4px 9px;border-radius:20px
  }
  .chev{flex:0 0 auto;width:18px;height:18px;fill:#9aabb0;transition:transform .22s}
  .ing.open .chev{transform:rotate(90deg)}
  .prods{display:none;padding:0 10px 8px;border-top:1px solid var(--line)}
  .ing.open .prods{display:block}
  .prod{
    display:flex;gap:11px;align-items:flex-start;
    padding:11px 8px 12px;border-bottom:1px solid #f0f2f0
  }
  .prod-thumb{
    flex:0 0 auto;width:70px;height:70px;border-radius:12px;overflow:hidden;
    background:#f3f6f5;border:1px solid #e2e6e4;display:flex;align-items:center;justify-content:center
  }
  .prod-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .prod-thumb.noimg{display:none}
  .prod-body{flex:1;min-width:0}
  .prod:last-child{border-bottom:0}
  .prod-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .prod-nm{font-size:14px;font-weight:700;color:var(--ink);line-height:1.32;word-break:break-word}
  .prod-pr{
    flex:0 0 auto;font-size:14.5px;font-weight:800;color:var(--price);
    white-space:nowrap;font-variant-numeric:tabular-nums
  }
  .prod-pr small{font-size:11px;font-weight:700;color:#6a8a80}
  .prod-sub{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.5}
  .prod-sub .lbl{color:#96a5a9;font-weight:600}
  .prod-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;align-items:center}
  .tag{
    font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;
    background:#eef2f0;color:#3d5259
  }
  .tag.maker{background:#e8f1ef;color:var(--accent-d)}
  .tag.note{background:#fff3e6;color:#a15b12}
  .tag.soldout{background:#fdeaea;color:#b23b3b}
  .tag.code{background:#eef1f4;color:#5a6b7a;font-variant-numeric:tabular-nums}
  mark{background:#ffe89e;color:inherit;border-radius:2px;padding:0 1px}
  .empty{text-align:center;padding:60px 20px;color:var(--ink2)}
  .empty .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .top{
    position:fixed;right:14px;bottom:calc(env(safe-area-inset-bottom) + 16px);
    width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;
    border:0;box-shadow:0 4px 14px rgba(18,122,107,.4);font-size:20px;display:none;
    align-items:center;justify-content:center;z-index:15;cursor:pointer
  }
  .top.show{display:flex}
  .foot{text-align:center;font-size:10.5px;color:#9aa9ad;padding:24px 12px 8px}
</style>
</head>

const list = document.getElementById('list');
const q = document.getElementById('q');
const clearBtn = document.getElementById('clear');
const catbar = document.getElementById('catbar');
const topBtn = document.getElementById('top');
let activeCat = null;

// unique categories in order
const cats = [];
DATA.forEach(s => { if(!cats.includes(s.c)) cats.push(s.c); });

// build category chips
const allChip = mkChip('전체', null);
catbar.appendChild(allChip);
cats.forEach(c => catbar.appendChild(mkChip(c, c)));
function mkChip(label, val){
  const b = document.createElement('button');
  b.className = 'catchip' + (val===activeCat?' on':'');
  b.textContent = label;
  b.onclick = () => {
    activeCat = val;
    [...catbar.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    render();
    window.scrollTo({top:0});
  };
  return b;
}

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escAttr(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function hl(text, terms){
  let out = esc(text);
  if(!terms.length) return out;
  terms.forEach(t=>{
    if(!t) return;
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    out = out.replace(re,'<mark>$1</mark>');
  });
  return out;
}

function priceFmt(p){
  if(!p) return '';
  return '<span class="prod-pr">'+esc(p)+'<small> 원</small></span>';
}

function render(){
  const raw = q.value.trim().toLowerCase();
  const terms = raw.split(/\s+/).filter(Boolean);
  clearBtn.classList.toggle('show', !!raw);
  list.innerHTML = '';

  let secShown = 0, prodShown = 0;
  let lastCat = null;
  const frag = document.createDocumentFragment();

  DATA.forEach(sec => {
    if(activeCat && sec.c !== activeCat) return;

    // determine matching: search across ingredient name, category, and every product field
    let secMatch = false;
    let prodList = sec.p;
    if(terms.length){
      const secHay = (sec.n+' '+sec.c).toLowerCase();
      const secAll = terms.every(t=>secHay.includes(t));
      if(secAll){
        secMatch = true; // whole section matches ingredient/category
      } else {
        // filter products whose combined text matches all terms
        prodList = sec.p.filter(p=>{
          const hay = (p.nm+' '+p.ig+' '+p.mk+' '+p.cd+' '+p.sp+' '+p.nt).toLowerCase();
          return terms.every(t=>hay.includes(t));
        });
        if(prodList.length) secMatch = true;
      }
    } else {
      secMatch = true;
    }
    if(!secMatch) return;

    if(sec.c !== lastCat){
      const h = document.createElement('div');
      h.className = 'grp-cat';
      h.innerHTML = '<span>'+hl(sec.c,terms)+'</span>';
      frag.appendChild(h);
      lastCat = sec.c;
    }

    secShown++;
    prodShown += prodList.length;
    const open = terms.length>0; // auto-expand on search

    const card = document.createElement('div');
    card.className = 'ing' + (open?' open':'');
    const total = sec.p.length;
    card.innerHTML =
      '<div class="ing-head">'+
        '<div class="ing-main">'+
          '<div class="ing-name">'+hl(sec.n,terms)+'</div>'+
          '<div class="ing-meta">'+esc(sec.c)+'</div>'+
        '</div>'+
        '<span class="ing-count">'+prodList.length+(prodList.length<total?'/'+total:'')+'</span>'+
        '<svg class="chev" viewBox="0 0 24 24"><path d="M8.6 5.4 15.2 12l-6.6 6.6L10 20l8-8-8-8z"/></svg>'+
      '</div>'+
      '<div class="prods">'+ prodList.map(p=>prodHTML(p,terms)).join('') +'</div>';

    const head = card.querySelector('.ing-head');
    head.onclick = () => card.classList.toggle('open');
    frag.appendChild(card);
  });

  if(secShown===0){
    list.innerHTML = '<div class="empty"><div class="big">검색 결과가 없습니다</div><div>다른 성분명·제품명·코드로 검색해 보세요</div></div>';
  } else {
    list.appendChild(frag);
  }
  document.getElementById('sc').textContent = secShown;
  document.getElementById('pc').textContent = prodShown;
}

function imageUrlByCode(p){
  const code = (p.cd || '').trim();
  if(!code) return '';
  if(p.img) return p.img;
  if(IMAGE_MAP[code]) return IMAGE_MAP[code];
  return IMAGE_BASE + code + '.jpg';
}

function prodImgHTML(p){
  const code = (p.cd || '').trim();
  if(!code) return '';
  const src = imageUrlByCode(p);
  return '<div class="prod-thumb" data-code="'+escAttr(code)+'">'+
    '<img src="'+escAttr(src)+'" loading="lazy" alt="'+escAttr(p.nm)+'" data-code="'+escAttr(code)+'" data-img-try="0" onerror="handleImageError(this)">'+
  '</div>';
}

function handleImageError(img){
  const code = img.dataset.code || '';
  const tried = parseInt(img.dataset.imgTry || '0', 10) + 1;

  // 외부 이미지가 차단되거나 실패하면 local images/보험코드.jpg부터 다시 시도
  if(IMAGE_MAP[code] && code && !img.dataset.localFallback){
    img.dataset.localFallback = '1';
    img.dataset.imgTry = '0';
    img.src = IMAGE_BASE + code + '.' + IMAGE_EXTS[0];
    return;
  }

  // local 이미지 확장자 순서대로 jpg → jpeg → png → webp 시도
  if(code && tried < IMAGE_EXTS.length){
    img.dataset.imgTry = String(tried);
    img.src = IMAGE_BASE + code + '.' + IMAGE_EXTS[tried];
    return;
  }

  const box = img.closest('.prod-thumb');
  if(box) box.classList.add('noimg');
}

function prodHTML(p, terms){
  let tags = '';

  if(p.mk) tags += '<span class="tag maker">'+hl(p.mk,terms)+'</span>';
  if(p.cd) tags += '<span class="tag code">'+hl(p.cd,terms)+'</span>';

  if(p.nt){
    if(p.nt==='품절') tags += '<span class="tag soldout">품절</span>';
    else tags += '<span class="tag note">'+hl(p.nt,terms)+'</span>';
  }

  return '<div class="prod">'+
    prodImgHTML(p)+
    '<div class="prod-body">'+
      '<div class="prod-top">'+
        '<div class="prod-nm">'+hl(p.nm,terms)+'</div>'+
        priceFmt(p.pr)+
      '</div>'+
      '<div class="prod-sub"><span class="lbl">규격</span> '+hl(p.sp,terms)+'</div>'+
      (p.ig?'<div class="prod-sub"><span class="lbl">성분</span> '+hl(p.ig,terms)+'</div>':'')+
      '<div class="prod-tags">'+tags+'</div>'+
    '</div>'+
  '</div>';
}
// search debounce
let t;
q.addEventListener('input', ()=>{clearTimeout(t); t=setTimeout(render,120);});
clearBtn.onclick = ()=>{ q.value=''; render(); q.focus(); };

// back-to-top
window.addEventListener('scroll', ()=>{ topBtn.classList.toggle('show', window.scrollY>500); });
topBtn.onclick = ()=> window.scrollTo({top:0,behavior:'smooth'});

render();
</script>
